[build]
  command = "npm run build"      # next build → standalone
  publish = ".next"              # публикуем .next, а не out

[[plugins]]
  package = "@netlify/next"      # офиц. плагин, берёт .next и создаёт функции

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION  = "8"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200